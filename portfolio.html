<!DOCTYPE html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Galleri — Andys Snedkerfirma</title>

<style>

body{

margin:0;
font-family:-apple-system, Helvetica, Arial;
background:#f4f1eb;
color:#111;

}


/* HEADER */

.header{

padding:80px 20px 40px;
max-width:1200px;
margin:auto;

}

h1{

font-size:48px;
margin:0;

}

p{

opacity:.6;

}


/* GRID */

.grid{

max-width:1200px;
margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:28px;

padding:20px;

}


/* CARD */

.card{

position:relative;
overflow:hidden;
cursor:pointer;

background:white;

}

.card img{

width:100%;
height:420px;

object-fit:cover;

transition:.5s ease;

}


/* hover zoom */

.card:hover img{

transform:scale(1.06);

}


/* overlay */

.overlay{

position:absolute;

inset:0;

display:flex;

align-items:end;

padding:20px;

background:

linear-gradient(
transparent,
rgba(0,0,0,.6)
);

opacity:0;

transition:.35s;

}


.card:hover .overlay{

opacity:1;

}


.title{

color:white;

font-size:20px;

letter-spacing:.02em;

}


</style>

</head>

<body>

<div class="header">

<h1>Portfolio</h1>

<p>Klik på et værk for at se detaljer.</p>

</div>



<div class="grid">

</div>

</div>

</div>

</a>

<div class="overlay">

</div>
